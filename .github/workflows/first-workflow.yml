name: First workflow for github actions

on:
  push:
    branches: [main]

  schedule:
    - cron: "*/40 * * * *"

jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: hello
        run: echo "hello and welcome to github actions"

      - name: fair well
        run: echo "see you next time"

  second-job:
    runs-on: ubuntu-latest
    needs: first-job
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Welcome
        run: echo "hello and welcome to your application lets run it"

      - name: Run app
        run: node index.js &

      - name: fair well
        run: echo "see you next time"
